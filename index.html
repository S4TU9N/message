<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>saturnchat</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- STATUS (SINGLE INSTANCE ONLY) -->
  <div id="statusBox" style="padding:8px; font-family: monospace; z-index: 1000;">
    idle
  </div>

  <!-- SETUP (AUTH + ROOMS) -->
    <div id="setup">

      <div class="setup-card">

          <h1>SaturnChat</h1>
          <p class="subtitle">Simple chatroom site</p>

          <div id="authSection">

              <input id="emailInput" type="email" placeholder="Email">

              <input id="passwordInput" type="password" placeholder="Password">

              <input id="usernameInput" type="text" placeholder="Username">

              <div class="auth-buttons">
                  <button id="loginBtn">Login</button>
                  <button id="signupBtn">Sign Up</button>
              </div>

          </div>

          <hr>

          <div id="roomSection">

              <input id="roomInput" type="text" placeholder="Room Name">
              <div class="room-buttons">
                <button class="roomBtn" id="joinBtn">Join Room</button>
                <button class="roomBtn" id="logoutBtn">Logout</button>
              </div>
              <div id="openRooms"></div>

          </div>

      </div>

  </div>

  <!-- CHAT VIEW -->
  <div id="chat" class="hidden">

  <div id="messages"></div>

    <div id="inputBar">

      <input id="messageInput" type="text" placeholder="Message..." />
      <button id="sendBtn">Send</button>

    </div>

  </div>

  <script src="main.js"></script>

</body>
</html>
