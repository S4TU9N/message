<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Chat</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

  <!-- SETUP -->

  <div id="setup">

    <h1>
      Chat Test V.2.0
    </h1>

    <!-- USERNAME -->

    <input
      id="usernameInput"
      type="text"
      placeholder="Username"
      maxlength="20"
    >

    <!-- EMAIL -->

    <input
      id="emailInput"
      type="email"
      placeholder="Email"
    >

    <!-- PASSWORD -->

    <input
      id="passwordInput"
      type="password"
      placeholder="Password"
    >

    <!-- ROOM -->

    <input
      id="roomInput"
      type="text"
      placeholder="Room Name"
    >

    <!-- AUTH BUTTONS -->

    <div id="authButtons">

      <button id="signupBtn">
        Sign Up
      </button>

      <button id="loginBtn">
        Login
      </button>

    </div>

    <!-- JOIN -->

    <button id="joinBtn">
      Join Room
    </button>

  </div>

  <!-- CHAT -->

  <div
    id="chat"
    class="hidden"
  >

    <div id="messages"></div>

    <div id="inputBar">

      <input
        id="messageInput"
        type="text"
        placeholder="Message..."
      >

      <button id="sendBtn">
        Send
      </button>

    </div>

  </div>

  <!-- DEBUG -->

  <div id="debug"></div>

  <script src="main.js"></script>

</body>

</html>
