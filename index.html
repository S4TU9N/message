<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- STATUS BAR (important for debugging without devtools) -->
  <div id="statusBox" style="padding:8px; font-family: monospace;">
    idle
  </div>

  <!-- AUTH / SETUP SCREEN -->
  <div id="setup">

    <h1>Chat</h1>

    <input id="emailInput" type="email" placeholder="Email" />

    <input id="passwordInput" type="password" placeholder="Password" />

    <input id="usernameInput" type="text" placeholder="Username" maxlength="20" />

    <div style="margin-top:10px;">
      <button id="signupBtn">Sign Up</button>
      <button id="loginBtn">Login</button>
    </div>

    <hr />

    <input id="roomInput" type="text" placeholder="Room name" />

    <button id="joinBtn">Join Room</button>

  </div>

  <!-- CHAT SCREEN -->
  <div id="chat" class="hidden">

    <div id="messages"
         style="height:400px; overflow-y:auto; padding:10px;">
    </div>

    <div id="inputBar">

      <input id="messageInput" type="text" placeholder="Message..." />

      <button id="sendBtn">Send</button>

    </div>

  </div>

  <script src="main.js"></script>

</body>
</html>
