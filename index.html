<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="setup">
    <h1>Chat Test V.1.0</h1>

    <input id="nameInput" placeholder="Name" maxlength="20">

    <input type="color" id="colorInput" value="#00ffcc">

    <input id="roomInput" placeholder="Room Name">

    <input id="passwordInput" type="password" placeholder="Room Password">

    <button id="joinBtn">Join Room</button>
  </div>

  <div id="chat" class="hidden">

    <div id="messages"></div>

    <div id="inputArea">
      <input id="messageInput" placeholder="Message">
      <button id="sendBtn">Send</button>
    </div>

  </div>
  <div id="debug" style="white-space:pre; font-family:monospace; color:red;"></div>

  <script src="main.js"></script>
</body>
</html
