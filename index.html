<body>

  <div id="setup">
    <h1>Chat Test V.1.2</h1>

    <input id="nameInput" placeholder="Name" maxlength="20">

    <input type="color" id="colorInput" value="#00ffcc">

    <input id="roomInput" placeholder="Room Name">

    <input id="passwordInput" type="password" placeholder="Room Password">

    <button id="joinBtn">Join Room</button>
  </div>

  <div id="chat" class="hidden">

    <div id="messages"></div>

    <div id="inputBar">
      <input type="text" id="messageInput" placeholder="Message...">
      <button id="sendBtn">Send</button>
    </div>

  </div>

  <div id="debug"></div>

  <script src="main.js"></script>

</body>
