<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Chat</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div id="setup">
    <h1>Chat Test V.1.6</h1>

    <input
      id="nameInput"
      type="text"
      placeholder="Name"
      maxlength="20"
    >

    <input
      id="colorInput"
      type="color"
      value="#00ffcc"
    >

    <input
      id="roomInput"
      type="text"
      placeholder="Room Name"
    >

    <input
      id="passwordInput"
      type="password"
      placeholder="Room Password"
    >

    <button id="joinBtn">
      Join Room
    </button>
  </div>

  <div id="chat" class="hidden">

    <div id="messages"></div>

    <div id="inputBar">

      <input
        id="messageInput"
        type="text"
        placeholder="Message..."
      >

      <button id="sendBtn">
        Send
      </button>

    </div>

  </div>

  <div id="debug"></div>

  <script src="main.js"></script>

</body>
</html>
