<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sahibchat</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- STATUS (SINGLE INSTANCE ONLY) -->
  <div id="statusBox" style="padding:8px; font-family: monospace;">
    idle
  </div>

  <!-- SETUP (AUTH + ROOMS) -->
  <div id="setup">

    <h1>sahibchat</h1>

    <!-- AUTH SECTION -->
    <div id="authSection">

      <input id="emailInput" type="email" placeholder="Email">

      <input id="passwordInput" type="password" placeholder="Password">

      <input id="usernameInput" type="text" placeholder="Username">

      <button id="signupBtn">Sign Up</button>
      <button id="loginBtn">Login</button>
      <h2>Active Rooms</h2>
    </div>
    
    
    <!-- ROOM SECTION -->
    <div id="roomSection">

      <input id="roomInput" type="text" placeholder="Room Name">

      <button id="joinBtn">Join Room</button>
      <button id="logoutBtn">Logout</button>

      <!-- OPEN ROOMS LIST (REQUIRED BY JS) -->
      <div id="openRooms"></div>

    </div>

  </div>

  <!-- CHAT VIEW -->
  <div id="chat" class="hidden">

  <div id="messages"></div>

    <div id="inputBar">

      <input id="messageInput" type="text" placeholder="Message..." />
      <button id="sendBtn">Send</button>

    </div>

  </div>

  <script src="main.js"></script>

</body>
</html>
